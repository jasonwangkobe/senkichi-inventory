<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>千吉综合库存系统</title>
    <style>
        /* 页面基础样式 */
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif; background-color: #f2f2f7; margin: 0; padding: 10px; padding-bottom: 100px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 15px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; font-size: 22px; margin: 10px 0; color: #1c1c1e; }
        
        /* 选项卡样式 */
        .tabs { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { padding: 8px 16px; border-radius: 20px; border: 1px solid #ddd; background: #eee; font-size: 13px; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
        .tab-btn.active { background: #007aff; color: white; border-color: #007aff; font-weight: bold; }
        
        .user-info { text-align: center; font-size: 12px; color: #8e8e93; margin-bottom: 15px; }
        
        /* 列表行样式 */
        .item-row { display: flex; align-items: center; padding: 12px 0; border-bottom: 1px solid #f2f2f7; }
        .item-row:last-child { border-bottom: none; }
        .item-name-cell { flex: 2; min-width: 80px; }
        .item-name { font-weight: bold; font-size: 15px; color: #1c1c1e; }
        .item-stock { font-size: 11px; color: #8e8e93; margin-top: 2px; }
        
        /* 输入组样式 */
        .input-group { flex: 4; display: flex; gap: 4px; justify-content: flex-end; align-items: center; }
        .qty-input { width: 38px; padding: 8px 4px; border: 1px solid #ddd; border-radius: 6px; text-align: center; font-size: 14px; -webkit-appearance: none; }
        .in-input { border-left: 3px solid #34c759; background-color: #fafffb; }
        .out-input { border-left: 3px solid #ff3b30; background-color: #fffafa; }
        
        /* 调拨特有样式 - 橙色区分 */
        .trans-input { border-left: 3px solid #ff9500; background-color: #fffaf2; width: 42px; }
        .trans-label { font-size: 10px; color: #ff9500; margin-bottom: 2px; text-align: center; font-weight: bold;}
        .input-unit { display: flex; flex-direction: column; align-items: center; }

        /* 底部固定提交按钮 */
        .footer-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); padding: 15px; border-top: 1px solid #ddd; backdrop-filter: blur(10px); display: flex; justify-content: center; z-index: 1000; }
        .submit-btn { width: 90%; max-width: 400px; background: #007aff; color: white; border: none; padding: 16px; border-radius: 12px; font-size: 18px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,122,255,0.3); }
        .submit-btn:disabled { background: #c7c7cc; box-shadow: none; }

        .tag-sum { background: #ff9500; color: white; padding: 2px 5px; border-radius: 4px; font-size: 10px; margin-left: 5px; }
        .loading { text-align: center; padding: 30px; color: #8e8e93; }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="title">烧鸟千吉 - 店面</h1>
        <div class="user-info" id="user-display">正在同步安全配置...</div>

        <div class="tabs" id="admin-tabs" style="display: none;">
            <div class="tab-btn active" id="btn-shop" onclick="switchTab('店面库存')">店面库存</div>
            <div class="tab-btn" id="btn-home" onclick="switchTab('家里库存')">家里库存</div>
            <div class="tab-btn" id="btn-total" onclick="switchTab('总库存')">📊 汇总分析</div>
        </div>

        <div id="loading" class="loading">加载中...</div>
        <div id="inventory-list"></div>
    </div>

    <div class="footer-bar" id="footer">
        <button class="submit-btn" id="submit-bulk" onclick="submitBulk()">批量写入数据</button>
    </div>

    <script>
        // 请确保此处的 URL 与您最新的 GAS 部署链接一致
        const API_URL = "https://script.google.com/macros/s/AKfycbzvxP2_Eo-AuCvgjRxB6ks1Qiq-9-ispw0D-wkJz90R0CzZmGApW4ovph_dCgs0jXd_/exec"; 
        let currentSheet = "店面库存";

        function checkUser() {
            let user = localStorage.getItem('senkichi_user');
            if (!user) {
                const pass = prompt("【千吉安全验证】请输入访问密码：");
                if (pass === "871121") {
                    user = "老板";
                    localStorage.setItem('senkichi_user', user);
                } else if (pass === "0642563135") {
                    const name = prompt("密码正确。请输入您的姓名进行登记：");
                    if (name && name.trim() !== "") {
                        user = name;
                        localStorage.setItem('senkichi_user', user);
                    } else {
                        alert("必须输入姓名。");
                        location.reload();
                        return null;
                    }
                } else {
                    alert("密码错误，禁止访问。");
                    return null;
                }
            }
            if (user === "老板") document.getElementById('admin-tabs').style.display = 'flex';
            document.getElementById('user-display').innerHTML = `当前人: <strong>${user}</strong> | <span onclick="logout()" style="color:#007aff; cursor:pointer;">退出</span>`;
            return user;
        }

        function logout() { localStorage.removeItem('senkichi_user'); location.reload(); }

        function switchTab(s) {
            currentSheet = s;
            document.getElementById('btn-shop').classList.toggle('active', s === '店面库存');
            document.getElementById('btn-home').classList.toggle('active', s === '家里库存');
            document.getElementById('btn-total').classList.toggle('active', s === '总库存');
            document.getElementById('title').innerText = (s === '总库存') ? "全库汇总报表" : "烧鸟千吉 - " + s.replace("库存","");
            document.getElementById('footer').style.display = (s === '总库存') ? 'none' : 'flex';
            loadInventory();
        }

        async function loadInventory() {
            const user = checkUser();
            if (!user) return;
            const list = document.getElementById('inventory-list');
            const loader = document.getElementById('loading');
            loader.style.display = 'block';
            list.innerHTML = '';
            
            try {
                const res = await fetch(`${API_URL}?sheet=${currentSheet}`);
                const data = await res.json();
                
                data.forEach(item => {
                    const isTotalView = currentSheet === '总库存';
                    const isBoss = (user === "老板");
                    const row = document.createElement('div');
                    row.className = 'item-row';
                    
                    // 确定调拨的方向文本
                    let transLabel = currentSheet === "店面库存" ? "拨往家里" : "拨往店面";

                    row.innerHTML = `
                        <div class="item-name-cell">
                            <div class="item-name">${item.product}${isTotalView ? '<span class="tag-sum">SUM</span>' : ''}</div>
                            <div class="item-stock">余量: <strong>${item.stock}</strong></div>
                        </div>
                        ${!isTotalView ? `
                        <div class="input-group">
                            <div class="input-unit">
                                <span style="font-size:9px; color:#34c759;">入库</span>
                                <input type="number" class="qty-input in-input" data-prod="${item.product}" data-act="入库" inputmode="numeric">
                            </div>
                            <div class="input-unit">
                                <span style="font-size:9px; color:#ff3b30;">出库</span>
                                <input type="number" class="qty-input out-input" data-prod="${item.product}" data-act="出库" inputmode="numeric">
                            </div>
                            ${isBoss ? `
                            <div class="input-unit">
                                <span class="trans-label">${transLabel}</span>
                                <input type="number" class="qty-input trans-input" data-prod="${item.product}" data-act="调拨" inputmode="numeric">
                            </div>
                            ` : ''}
                        </div>` : '<div style="flex:4; text-align:right; font-size:12px; color:#007aff;">仅供查看</div>'}
                    `;
                    list.appendChild(row);
                });
            } catch (e) {
                loader.innerText = "数据同步失败";
            } finally {
                loader.style.display = 'none';
            }
        }

        async function submitBulk() {
            const user = localStorage.getItem('senkichi_user');
            const inputs = document.querySelectorAll('.qty-input');
            const tasks = [];

            inputs.forEach(input => {
                const val = parseInt(input.value);
                if (val > 0) {
                    const action = input.getAttribute('data-act');
                    const product = input.getAttribute('data-prod');
                    
                    if (action === "调拨") {
                        // 如果在店面页填调拨，就是 店面 -> 家里
                        let from = (currentSheet === "店面库存") ? "店面库存" : "家里库存";
                        let to = (currentSheet === "店面库存") ? "家里库存" : "店面库存";
                        tasks.push({ action: "调拨", product: product, amount: val, from: from, to: to });
                    } else {
                        tasks.push({ action: action, product: product, amount: val });
                    }
                }
            });

            if (tasks.length === 0) return alert("请先输入变动数量。");
            
            const btn = document.getElementById('submit-bulk');
            btn.disabled = true;
            btn.innerText = "正在同步...";

            try {
                const resp = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ tasks: tasks, user: user, sheet: currentSheet })
                });
                const res = await resp.json();
                if (res.status === 'success') {
                    alert("同步成功！");
                    location.reload();
                }
            } catch (e) {
                alert("提交失败，请重试。");
                btn.disabled = false;
                btn.innerText = "批量写入数据";
            }
        }

        window.onload = loadInventory;
    </script>
</body>
</html>
